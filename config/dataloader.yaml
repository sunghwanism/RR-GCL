relation:
  pos_strategy: topk
  pos_topk: 10
  pos_percentile: 95.0
  neg_strategy: topk
  neg_topk: 100
  neg_percentile: 10.0
  k_pos: 10
  k_neg: 100
  invalid_anchor_behavior: drop
  coverage_strict: false
  min_cross_component_rate: 0.0
  min_k_neg_feasible_rate: 0.0
  min_median_candidate_pool: 0.0

neg_sampling:
  mode: component_aware
  same_cc_target_ratio: 0.7
  cross_cc_target_ratio: 0.3
  fallback: fill_from_other_pool
  strict: false

subgraph:
  num_hops: 2
  node_feature_keys: null
  edge_feature_keys: null
